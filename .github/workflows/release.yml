name: Release
on:
  push:
    tags: ["v*"]
  workflow_call:

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: composer-linux-amd64
            os: depot-ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            artifact: composer-linux-arm64
            os: depot-ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            artifact: composer-darwin-amd64
            os: depot-macos-15
          - target: aarch64-apple-darwin
            artifact: composer-darwin-arm64
            os: depot-macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/composer ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  upload-assets:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Extract version from Cargo.toml
        id: version
        run: echo "version=v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Upload release assets
        run: |
          gh release upload "${{ steps.version.outputs.version }}" \
            composer-linux-amd64/composer-linux-amd64 \
            composer-linux-arm64/composer-linux-arm64 \
            composer-darwin-amd64/composer-darwin-amd64 \
            composer-darwin-arm64/composer-darwin-arm64 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: depot/setup-action@v1
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version from Cargo.toml
        id: version
        run: echo "version=v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        run: |
          depot build --push --project 2m5pzqgvpk \
            --platform "linux/arm64,linux/amd64" \
            -t afintech/composer:latest \
            -t afintech/composer:${{ steps.version.outputs.version }} .
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
